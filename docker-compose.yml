version: "3.9"

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: chess-app-engine
    ports:
      - "3002:3002"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: chess-app-api
    ports:
      - "3001:8000"
    depends_on:
      - engine

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess-app-frontend
    ports:
      - "3000:80"
    depends_on:
      - api



